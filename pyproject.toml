[project]
name = "sherloque"
version = "0.1.0"
description = "Sherloque is a minimal search engine with crawling, querying, and page ranking implemented."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.21.0",
    "bs4>=0.0.2",
    "nltk>=3.9.1",
    "pydantic>=2.11.9",
    "python-dotenv>=1.1.1",
]
